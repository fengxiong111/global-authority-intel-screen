<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Builders Intel Screen</title>
  <meta name="description" content="推荐关注人情报屏。" />
  <style>
    :root{
      --bg:#020202;--line:rgba(255,255,255,.012);--text:#f7f7f2;
    }
    *{box-sizing:border-box} html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",Arial,sans-serif}
    html,body{height:100%;overflow:hidden}
    .viewport{position:fixed;inset:0;overflow:hidden;background:var(--bg)}
    .scroll-layer{will-change:transform}
    html.mobile, html.mobile body{height:auto;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch}
    html.mobile body{min-height:100vh}
    .mobile .viewport{position:relative;inset:auto;overflow:visible;min-height:100vh}
    .mobile .scroll-layer{will-change:auto;transform:none !important}
    .app{width:min(100vw,2620px);margin:0 auto;padding:22px 104px 42px}
    .page-note{margin:0 0 6px;font-size:12px;line-height:1.35;letter-spacing:.04em;color:rgba(247,247,242,.42)}
    .page-status{margin:0 0 10px;font-size:11px;line-height:1.45;letter-spacing:.03em;color:rgba(247,247,242,.34)}
    .page-status div + div{margin-top:2px}
    .feed{padding-top:0}
    .item{padding:16px 0 18px;border-bottom:1px solid transparent;transform-origin:center center;opacity:1;transform:translate3d(0,0,0) scale(1)}
    .item + .item{margin-top:2px}
    .item:first-child{padding-top:22px;padding-bottom:42px;margin-bottom:16px;border-bottom-color:rgba(255,255,255,.018)}
    .item:nth-child(2){padding-top:24px;padding-bottom:28px;margin-bottom:14px;border-bottom-color:rgba(255,255,255,.014)}
    .item:nth-child(n+3):nth-child(-n+6){padding-top:10px;padding-bottom:10px}
    .item:nth-child(n+7){padding-top:11px;padding-bottom:13px}
    .item.entering{opacity:0;transform:translate3d(0,18px,0) scale(.995)}
    .headline{width:100%;max-width:25ch;font-size:clamp(28px,3.22vw,58px);line-height:1.18;font-weight:510;letter-spacing:-.017em;color:rgba(247,247,242,.79);word-break:normal;overflow-wrap:break-word;line-break:loose;text-wrap:pretty;hyphens:none;transition:opacity .18s linear, transform .18s linear}
    .item:first-child .headline{max-width:22.2ch;font-size:clamp(40px,4.28vw,76px);line-height:1.12;font-weight:605;letter-spacing:-.023em;color:rgba(247,247,242,.958);text-wrap:balance}
    .item:nth-child(2) .headline{max-width:23.4ch;font-size:clamp(34px,3.88vw,68px);line-height:1.15;font-weight:565;color:rgba(247,247,242,.91);letter-spacing:-.018em;text-wrap:balance}
    .item:nth-child(n+3):nth-child(-n+6) .headline{max-width:24.8ch;font-size:clamp(29px,3.22vw,54px);line-height:1.19;font-weight:520;color:rgba(247,247,242,.83);text-wrap:pretty}
    .item:nth-child(n+7) .headline{max-width:25.1ch;font-size:clamp(26px,3vw,48px);line-height:1.2;font-weight:505;color:rgba(247,247,242,.79);text-wrap:pretty}
    .item:nth-child(n+7) .meta{color:rgba(247,247,242,.38)}
    .meta{margin-top:8px;font-size:clamp(12px,1.02vw,14px);line-height:1.22;font-weight:475;letter-spacing:.012em;color:rgba(247,247,242,.48)}
    .item:first-child .meta{color:rgba(247,247,242,.5)}
    .item:nth-child(2) .meta{color:rgba(247,247,242,.49)}
    .empty{padding:48px 0;color:#777;font-size:24px}
    .mask{position:fixed;left:0;right:0;height:12vh;pointer-events:none;z-index:5}
    .mask-bottom{bottom:0;background:linear-gradient(0deg,rgba(2,2,2,.36) 0%,rgba(2,2,2,.18) 34%,rgba(2,2,2,.08) 64%,rgba(2,2,2,0) 100%)}
    @media (max-width: 1024px){
      .mobile .mask{display:none}
      .mobile .item,.mobile .headline{transition:none !important}
    }
    @media (pointer: coarse) and (min-width: 820px) and (orientation: landscape){
      .app{padding:14px 82px 32px}
      .page-note{margin-bottom:4px;font-size:12px}
      .page-status{margin-bottom:8px;font-size:11px}
      .item{padding:13px 0 15px}
      .item:first-child{padding-top:14px;padding-bottom:28px;margin-bottom:10px}
      .item:nth-child(2){padding-top:19px;padding-bottom:21px;margin-bottom:11px}
      .item:nth-child(n+3):nth-child(-n+6){padding-top:10px;padding-bottom:10px}
      .item:nth-child(n+7){padding-top:10px;padding-bottom:11px}
      .headline{max-width:25.2ch;font-size:clamp(25px,2.95vw,40px);line-height:1.2;font-weight:500;color:rgba(247,247,242,.81)}
      .item:first-child .headline{max-width:24.1ch;font-size:clamp(35px,4.08vw,52px);line-height:1.12;font-weight:588;color:rgba(247,247,242,.95)}
      .item:nth-child(2) .headline{max-width:24.4ch;font-size:clamp(30px,3.58vw,44px);line-height:1.145;font-weight:545;color:rgba(247,247,242,.9)}
      .item:nth-child(n+3):nth-child(-n+6) .headline{max-width:25.1ch;font-size:clamp(27px,3.06vw,38px);line-height:1.18;font-weight:515;color:rgba(247,247,242,.84)}
      .item:nth-child(n+7) .headline{max-width:25.3ch;font-size:clamp(24px,2.8vw,33px);line-height:1.19;font-weight:500;color:rgba(247,247,242,.8)}
      .meta{margin-top:7px;font-size:13px;line-height:1.22;font-weight:478;color:rgba(247,247,242,.5)}
      .item:first-child .meta{color:rgba(247,247,242,.52)}
      .item:nth-child(2) .meta{color:rgba(247,247,242,.5)}
      .item:nth-child(n+7) .meta{color:rgba(247,247,242,.41)}
    }
    @media (pointer: coarse) and (min-width: 820px) and (orientation: portrait){
      .app{padding:14px 44px 32px}
      .page-note{margin-bottom:4px;font-size:12px}
      .page-status{margin-bottom:8px;font-size:11px}
      .item{padding:12px 0 14px}
      .item:first-child{padding-top:10px;padding-bottom:24px;margin-bottom:10px}
      .item:nth-child(2){padding-top:16px;padding-bottom:19px;margin-bottom:10px}
      .item:nth-child(n+3):nth-child(-n+6){padding-top:10px;padding-bottom:10px}
      .item:nth-child(n+7){padding-top:10px;padding-bottom:11px}
      .headline{max-width:24.2ch;font-size:clamp(24px,3.34vw,39px);line-height:1.195;font-weight:500;color:rgba(247,247,242,.81)}
      .item:first-child .headline{max-width:22.4ch;font-size:clamp(33px,4.42vw,49px);line-height:1.125;font-weight:582;color:rgba(247,247,242,.945)}
      .item:nth-child(2) .headline{max-width:23.1ch;font-size:clamp(29px,3.86vw,43px);line-height:1.155;font-weight:542;color:rgba(247,247,242,.895)}
      .item:nth-child(n+3):nth-child(-n+6) .headline{max-width:24.3ch;font-size:clamp(26px,3.42vw,37px);line-height:1.185;font-weight:515;color:rgba(247,247,242,.84)}
      .item:nth-child(n+7) .headline{max-width:24.3ch;font-size:clamp(23px,3.1vw,32px);line-height:1.195;font-weight:500;color:rgba(247,247,242,.8)}
      .meta{margin-top:7px;font-size:13px;line-height:1.22;font-weight:478;color:rgba(247,247,242,.5)}
      .item:first-child .meta{color:rgba(247,247,242,.52)}
      .item:nth-child(2) .meta{color:rgba(247,247,242,.5)}
      .item:nth-child(n+7) .meta{color:rgba(247,247,242,.41)}
    }
    @media (max-width: 900px){
      .app{padding:10px 26px 28px}
      .page-note{margin-bottom:4px;font-size:11px}
      .page-status{margin-bottom:8px;font-size:10px}
      .item{padding:14px 0 17px}
      .item:first-child{padding-top:8px;padding-bottom:26px;margin-bottom:10px}
      .item:nth-child(2){padding-top:16px;padding-bottom:22px;margin-bottom:10px}
      .item:nth-child(n+3):nth-child(-n+6){padding-top:10px;padding-bottom:11px}
      .item:nth-child(n+7){padding-top:9px;padding-bottom:11px}
      .headline{max-width:100%;font-size:clamp(23px,6.82vw,40px);line-height:1.19;font-weight:500}
      .item:first-child .headline{max-width:100%;font-size:clamp(32px,8.4vw,51px);line-height:1.1;font-weight:605}
      .item:nth-child(2) .headline{max-width:100%;font-size:clamp(29px,7.88vw,47px);line-height:1.14;font-weight:570;color:rgba(247,247,242,.91)}
      .item:nth-child(n+3):nth-child(-n+6) .headline{max-width:100%;font-size:clamp(25px,6.9vw,41px);line-height:1.18;font-weight:520;color:rgba(247,247,242,.83)}
      .item:nth-child(n+7) .headline{max-width:100%;font-size:clamp(22px,6.32vw,36px);line-height:1.19;font-weight:500;color:rgba(247,247,242,.79)}
      .meta{margin-top:6px;font-size:12px;color:rgba(247,247,242,.44)}
      .mask{height:8vh}
    }
    @media (prefers-reduced-motion: reduce){
      .item,.headline{transition:none}
    }
  </style>
</head>
<body>
  <div class="viewport" id="viewport">
    <div class="mask mask-bottom"></div>
    <div class="scroll-layer" id="scrollLayer">
      <div class="app">
        <div class="page-note">Builders 精选</div>
        <div class="page-status" id="page-status">
          <div id="page-updated">本页更新于 --:--</div>
          <div id="page-front-change">第一屏最近一次变化：--:--</div>
          <div id="page-early-updated">Early signal 最近一次更新：--:--</div>
        </div>
        <main class="feed" id="feed"></main>
      </div>
    </div>
  </div>

  <script>
    const feedEl = document.getElementById('feed');
    const pageUpdatedEl = document.getElementById('page-updated');
    const pageFrontChangeEl = document.getElementById('page-front-change');
    const pageEarlyUpdatedEl = document.getElementById('page-early-updated');
    const viewportEl = document.getElementById('viewport');
    const scrollLayerEl = document.getElementById('scrollLayer');
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const isMobile = window.matchMedia('(pointer: coarse), (max-width: 1024px)').matches;
    if (isMobile) document.documentElement.classList.add('mobile');
    let targetY = 0;
    let currentY = 0;
    let firstRender = true;
    let touchStartY = null;
    let previousFeedIds = [];
    let lastRenderSignature = "";
    let currentFeedItems = [];
    let currentEarlySignals = [];
    const FEED_URL = './data/feed.json';
    const BUILDERS_OBSERVE_URL = './data/builders_observe.json';
    const EARLY_SIGNAL_URL = './data/early_signal.json';
    const ATTENTION_STORAGE_KEY = 'authority-intel-attention-v1';

    function itemTimeValue(item) {
      return item?.published_at || item?.fetched_at || null;
    }

    function displayTimestamp(item) {
      return item?.published_at || item?.fetched_at || item?.ts || '';
    }

    function validUnix(value) {
      const numeric = Number(value || 0);
      return Number.isFinite(numeric) && numeric > 0 ? numeric : null;
    }

    function parseHeaderTime(value) {
      if (!value) return null;
      const ts = Math.floor(new Date(value).getTime() / 1000);
      return Number.isFinite(ts) && ts > 0 ? ts : null;
    }

    function formatHm(value) {
      const ts = validUnix(value);
      if (!ts) return '--:--';
      return new Date(ts * 1000).toLocaleTimeString('zh-CN', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      });
    }

    function titlesEqual(a, b) {
      if (!Array.isArray(a) || !Array.isArray(b) || a.length !== b.length) return false;
      return a.every((value, index) => value === b[index]);
    }

    function firstScreenState(currentTitles, observeSnapshots, feedTs) {
      const snapshots = Array.isArray(observeSnapshots) ? observeSnapshots : [];
      const latest = snapshots[0] || null;
      const latestTitles = Array.isArray(latest?.titles) ? latest.titles : [];
      const latestTs = validUnix(latest?.fetch_time);

      if (!currentTitles.length) {
        return {
          changeTime: latestTs || feedTs,
          previousTitles: latestTitles,
          unchanged: false,
          unsyncedReason: 'no_current_titles',
        };
      }

      if (!latest) {
        return {
          changeTime: feedTs,
          previousTitles: [],
          unchanged: false,
          unsyncedReason: 'builders_observe_missing',
        };
      }

      if (!titlesEqual(currentTitles, latestTitles)) {
        return {
          changeTime: feedTs,
          previousTitles: latestTitles,
          unchanged: false,
          unsyncedReason: 'builders_observe_stale',
        };
      }

      let changeTime = latestTs || feedTs;
      let previousTitles = [];
      let unchanged = false;

      for (let i = 1; i < snapshots.length; i += 1) {
        const snapshotTitles = Array.isArray(snapshots[i]?.titles) ? snapshots[i].titles : [];
        if (!titlesEqual(currentTitles, snapshotTitles)) {
          previousTitles = snapshotTitles;
          unchanged = true;
          break;
        }
        changeTime = validUnix(snapshots[i]?.fetch_time) || changeTime;
      }

      return {
        changeTime,
        previousTitles,
        unchanged,
        unsyncedReason: '',
      };
    }

    function renderPageStatus({ feedFetchTime, observeSnapshots, earlyHeaderTime, currentFirstScreenTitles }) {
      const feedTs = validUnix(feedFetchTime);
      const observeTs = validUnix(observeSnapshots?.[0]?.fetch_time);
      const earlyTs = earlyHeaderTime;
      const cycleSlack = 15 * 60;
      const firstScreen = firstScreenState(currentFirstScreenTitles, observeSnapshots, feedTs);
      const observeUnsynced = !observeTs || !feedTs || (feedTs - observeTs) > cycleSlack;
      const earlyUnsynced = !earlyTs || !feedTs || (feedTs - earlyTs) > cycleSlack;
      const observeReason = !observeTs ? 'builders_observe_missing' : ((feedTs - observeTs) > cycleSlack ? 'builders_observe_lagging' : firstScreen.unsyncedReason || '');
      const earlyReason = !earlyTs ? 'early_signal_missing' : ((feedTs - earlyTs) > cycleSlack ? 'early_signal_lagging' : '');
      const frontSuffix = observeUnsynced ? '（未同步）' : (firstScreen.unchanged ? '（未变化）' : '');
      const earlySuffix = earlyUnsynced ? '（未同步）' : '';

      pageUpdatedEl.textContent = `本页更新于 ${formatHm(feedTs)}`;
      pageFrontChangeEl.textContent = `第一屏最近一次变化：${formatHm(firstScreen.changeTime)}${frontSuffix}`;
      pageEarlyUpdatedEl.textContent = `Early signal 最近一次更新：${formatHm(earlyTs)}${earlySuffix}`;

      console.log('[builders] feed_fetch_time', feedTs);
      console.log('[builders] builders_observe_time', observeTs);
      console.log('[builders] builders_first_screen_change_time', firstScreen.changeTime);
      console.log('[builders] early_signal_time', earlyTs);
      console.log('[builders] current_first_screen_titles', currentFirstScreenTitles);
      console.log('[builders] previous_first_screen_titles', firstScreen.previousTitles);
      console.log('[builders] unsynced_reason', {
        builders_observe: observeReason,
        early_signal: earlyReason,
      });
    }

    function readAttentionState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(ATTENTION_STORAGE_KEY) || '{}');
        return {
          clicked: parsed.clicked || {},
          reopened: parsed.reopened || {},
          saved: parsed.saved || {},
          skipped: parsed.skipped || {},
          last_click_at: parsed.last_click_at || {},
        };
      } catch {
        return { clicked: {}, reopened: {}, saved: {}, skipped: {}, last_click_at: {} };
      }
    }

    function writeAttentionState(next) {
      try {
        localStorage.setItem(ATTENTION_STORAGE_KEY, JSON.stringify(next));
      } catch {
        // ignore
      }
    }

    function attentionKey(item) {
      return `${item.topic || item.category || 'OTHER'}::${item.sourceType || item.source || 'news'}`;
    }

    function recordAttention(action, item) {
      if (!item) return;
      const store = readAttentionState();
      const bucket = action === 'saved' ? 'saved' : action === 'skipped' ? 'skipped' : 'clicked';
      const key = attentionKey(item);
      store[bucket][key] = (store[bucket][key] || 0) + 1;
      if (action === 'clicked') {
        const urlKey = item.url || item.id;
        if (store.last_click_at[urlKey]) {
          store.reopened[key] = (store.reopened[key] || 0) + 1;
        }
        store.last_click_at[urlKey] = Date.now();
      }
      writeAttentionState(store);
    }

    function openItem(item) {
      if (!item?.url) return;
      recordAttention('clicked', item);
      window.open(item.url, '_blank', 'noopener,noreferrer');
    }

    const SIGNAL_TERMS = {
      aiRelease: ['release', '发布', '更新', 'launch', 'launched', 'introducing', 'beta', 'version', 'mini', 'nano', 'opus', 'sonnet', 'bug bounty', 'acquire', 'agent', 'coding agent', 'claude code', 'model spec', 'computer use'],
      appleChange: ['iphone', 'ipad', 'mac', 'macbook', 'airpods', 'watch', 'ios', '应用', '功能', 'feature', 'product', 'm5', 'new app', '数字驾照'],
      macro: ['war', 'iran', 'middle east', 'ceasefire', 'strike', 'marines', 'btc', 'bitcoin', 'etf', 'fund flow', 'market structure', 'regulation', 'regulator', 'judge', 'court', 'pentagon', 'supply chain risk'],
      infra: ['security', 'audit', 'risk', 'breach', 'supply chain', 'chip', 'helium', 'wallet', 'infrastructure'],
      redditInfo: ['发布', '更新', '将发布', '计划支持', '数字驾照', '停止运营', '被 ai 取代', 'ability', 'launch', 'feature', 'apps', 'driver', 'license'],
      weak: ['podcast', 'share of the week', 'discussion', 'thread', 'hands-on report', 'anyone else', 'on “read”', 'on "read"', 'rumor', 'rumors', '体验', '吐槽', '观点', 'i think', 'why', 'how', 'versus', 'vs.', 'megathread', 'marketing', 'sponsored', 'sponsor'],
      charts: ['电影：', '剧集：', '图书：'],
    };
    const STRONG_SIGNAL_TERMS = ['openclaw', 'apple', 'openai', 'anthropic', 'war', 'iran', 'btc', 'bitcoin', 'etf'];
    const OFFICIAL_SOURCES = new Set([
      'Apple Newsroom',
      'OpenAI News',
      'Anthropic Newsroom',
      'Claude Code Changelog',
      'Claude release notes',
      'Tesla IR',
      'OpenClaw GitHub',
      'OpenClaw Blog',
      'OneKey Blog',
      'PlayStation Blog',
      'Sony Interactive'
    ]);
    const STRONG_SOURCES = new Set(['NYT', 'Bloomberg', 'Reuters', 'GitHub Trending']);
    const CHART_SOURCES = new Set(['Douban Movie Chart', 'JustWatch Movies', 'JustWatch TV', 'IMDb Movies', 'IMDb TV']);
    const THEME_CAPS = new Map([
      ['AI', 2],
      ['APPLE', 1],
      ['CRYPTO', 2],
      ['MACRO', 2],
      ['GAME', 1],
      ['SCREEN', 1],
      ['BOOK', 1],
    ]);
    const PRIMARY_AI_TOPICS = new Set(['OPENCLAW', 'OPENAI', 'ANTHROPIC', 'CLAUDE', 'CLAUDE_CODE']);
    const GAME_TOPICS = new Set(['GAME', 'NINTENDO', 'SWITCH', 'LEAGUE_OF_LEGENDS', 'PLAYSTATION', 'SONY']);
    const TOKEN_STOPWORDS = new Set(['openai', 'anthropic', 'claude', 'apple', 'openclaw', 'the', 'and', 'for', 'with', 'this', 'that', 'will', 'into']);

    function hasCjk(value = '') {
      return /[\u4e00-\u9fff]/.test(value);
    }

    function cjkRatio(value = '') {
      const visible = String(value).replace(/\s/g, '');
      if (!visible) return 0;
      const cjk = (visible.match(/[\u4e00-\u9fff]/g) || []).length;
      return cjk / visible.length;
    }

    function matchesTerm(text, term) {
      if (!term) return false;
      if (/[^\w-]/.test(term) || term.includes(' ')) {
        return text.includes(term);
      }
      const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return new RegExp(`(^|[^a-z0-9])${escaped}([^a-z0-9]|$)`, 'i').test(text);
    }

    function includesAny(text, words) {
      return words.some((word) => matchesTerm(text, word));
    }

    function canonicalText(value = '') {
      return String(value).toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]+/g, ' ').replace(/\s+/g, ' ').trim();
    }

    function titleTokens(value = '') {
      return canonicalText(value)
        .split(' ')
        .filter((token) => token.length >= 3 && !TOKEN_STOPWORDS.has(token));
    }

    function isPrimaryAiRelease(item, text) {
      return PRIMARY_AI_TOPICS.has(item.topic) && OFFICIAL_SOURCES.has(item.source) && (
        item.topic === 'OPENCLAW'
        || includesAny(text, SIGNAL_TERMS.aiRelease)
      );
    }

    function isAppleChange(item, text) {
      return item.topic === 'APPLE' && includesAny(text, SIGNAL_TERMS.appleChange);
    }

    function isMacroSignal(item, text) {
      return includesAny(text, SIGNAL_TERMS.macro);
    }

    function isHeadlineMacroSignal(item) {
      return includesAny(`${item.title || ''} ${item.displayTitle || ''}`.toLowerCase(), SIGNAL_TERMS.macro);
    }

    function isInfrastructureSignal(item, text) {
      return includesAny(text, SIGNAL_TERMS.infra);
    }

    function isSecondaryReddit(item, text) {
      return item.source === 'Reddit'
        && item.priority >= 74
        && item.hot
        && hasCjk(item.displayTitle || '')
        && includesAny(text, SIGNAL_TERMS.redditInfo)
        && !includesAny(text, SIGNAL_TERMS.weak);
    }

    function isCommunityHot(item, text) {
      return item.sourceType === 'community_hot'
        && hasCjk(item.displayTitle || '')
        && !includesAny(text, SIGNAL_TERMS.weak)
        && ((item.score || 0) >= 120 || (item.comments || 0) >= 80 || item.hot);
    }

    function isXHot(item, text) {
      return item.sourceType === 'x_hot'
        && !includesAny(text, SIGNAL_TERMS.weak)
        && includesAny(text, ['codex', 'plugin', 'security', 'bug bounty', 'btc', 'bitcoin', 'etf', 'market', 'prediction market', 'war', 'iran']);
    }

    function isGithubHot(item, text) {

      if (Number.isNaN(date.getTime())) return '';
      const diff = Date.now() - date.getTime();
      if (diff < 0 || diff > 1000 * 60 * 60 * 24 * 30) return '';
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return '刚刚';
      if (mins < 60) return `${mins} 分钟前`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours} 小时前`;
      const days = Math.floor(hours / 24);
      return days <= 30 ? `${days} 天前` : '';
    }

    function updateVisuals() {
      if (isMobile) return;
      const center = window.innerHeight / 2;
      feedEl.querySelectorAll('.item').forEach((item) => {
        const rect = item.getBoundingClientRect();
        const itemCenter = rect.top + rect.height / 2;
        const distance = Math.min(1, Math.abs(itemCenter - center) / (window.innerHeight * 0.65));
        const opacity = reduceMotion ? 1 : 1 - distance * 0.28;
        const scale = reduceMotion ? 1 : 1 - distance * 0.018;
        item.style.opacity = opacity.toFixed(3);
        item.style.transform = `translate3d(0,0,0) scale(${scale.toFixed(4)})`;
      });
    }

    function animate() {
      if (isMobile) return;
      currentY = reduceMotion ? targetY : currentY + (targetY - currentY) * 0.12;
      if (Math.abs(targetY - currentY) < 0.1) currentY = targetY;
      scrollLayerEl.style.transform = `translate3d(0, ${currentY}px, 0)`;
      updateVisuals();
      requestAnimationFrame(animate);
    }

    function createItem(item, entering) {
      const article = document.createElement('article');
      article.className = 'item';
      article.dataset.id = item.id;
      article.tabIndex = 0;
      article.setAttribute('role', 'link');
      const headline = document.createElement("div");
      headline.className = "headline";
      headline.textContent = item.title || "";
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = formatRelativeTime(item.ts);
      article.appendChild(headline);
      article.appendChild(meta);
      if (entering && !reduceMotion) {
        article.classList.add('entering');
        requestAnimationFrame(() => article.classList.remove('entering'));
      }
      article.addEventListener('click', () => openItem(item));
      article.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          openItem(item);
        }
      });
      return article;
    }

    function render(items) {
      if (!Array.isArray(items) || !items.length) {
        feedEl.innerHTML = '<div class="empty">暂无情报</div>';
        return;
      }
      const signature = buildSignature(items);
      if (signature === lastRenderSignature) return;
      lastRenderSignature = signature;
      const existing = new Map([...feedEl.querySelectorAll('.item')].map(node => [node.dataset.id, node]));
      const nextIds = items.map(item => String(item.id));
      const fragment = document.createDocumentFragment();
      for (const item of items) {
        const id = String(item.id);
        let node = existing.get(id);
        if (!node) {
          const entering = !firstRender && !previousFeedIds.includes(id);
          node = createItem(item, entering);
        } else {
          const textEl = node.querySelector('.headline');
          if (textEl && textEl.textContent !== (item.title || '')) textEl.textContent = item.title || '';
          const metaEl = node.querySelector('.meta');
          if (metaEl) metaEl.textContent = formatRelativeTime(item.ts);
        }
        fragment.appendChild(node);
      }
      feedEl.replaceChildren(fragment);
      previousFeedIds = nextIds;
      if (firstRender) {
        targetY = currentY = 0;
        if (!isMobile) scrollLayerEl.style.transform = 'translate3d(0,0,0)';
        firstRender = false;
      } else if (!isMobile) {
        targetY = clampScroll(targetY);
      }
      updateVisuals();
    }

    function selectSignalItems(scored, threshold) {
      const selected = [];
      const sourceCap = new Map();
      const themeCap = new Map();
      const projectCap = new Map();
      let toolCount = 0;
      let githubTrendingCount = 0;
      let decisionCount = 0;
      let earlyCount = 0;

      const candidates = scored.filter((entry) => {
        if (Math.max(entry.signalScore, entry.attentionScore) < threshold) return false;
        return THEME_CAPS.has(themeBucket(entry.item));
      }).filter((entry) => crossSourceCount(entry.item) >= 2);

      function tryPick(entry, diversifyFirstFive) {
        const item = {
          ...entry.item,
          signal_score: entry.signalScore,
        };
        const theme = themeBucket(item);
        const project = projectKey(item);
        const nextSourceCount = sourceCap.get(item.source) || 0;
        const themeLimit = THEME_CAPS.get(theme) || 0;

        if (!themeLimit) return;
        if ((projectCap.get(project) || 0) >= 1) return;
        if (nextSourceCount >= 2) return;
        if ((themeCap.get(theme) || 0) >= themeLimit) return;
        if (diversifyFirstFive && selected.length < 5 && themeLimit > 1 && (themeCap.get(theme) || 0) >= 1) return;
        if (isNearDuplicate(item, selected)) return;
        if (isToolItem(item) && toolCount >= 1) return;

        projectCap.set(project, (projectCap.get(project) || 0) + 1);
        sourceCap.set(item.source, nextSourceCount + 1);
        themeCap.set(theme, (themeCap.get(theme) || 0) + 1);
        if (isToolItem(item)) toolCount += 1;
        if (isDecisionItem(item)) decisionCount += 1;
        if (isEarlyOpportunity(item)) earlyCount += 1;
        selected.push(item);
      }

      for (const entry of candidates.filter((entry) => isDecisionItem(entry.item))) {
        tryPick(entry, true);
        if (decisionCount >= 2 || selected.length >= 6) break;
      }

      for (const entry of candidates.filter((entry) => isEarlyOpportunity(entry.item))) {
        if (earlyCount >= 1 || selected.length >= 6) break;
        tryPick(entry, true);
      }

      for (const entry of candidates) {
        tryPick(entry, true);
        if (selected.length >= 6) break;
      }

      for (const entry of candidates) {
        if (selected.length >= 6) break;
        tryPick(entry, false);
      }

      return selected;
    }

    function buildSignalPool(items) {
      console.log('[builders] raw_count', items.length);
      const base = Array.isArray(items)
        ? items
          .filter(Boolean)
          .map((item) => ({ ...item, timestamp: validTimestamp(itemTimeValue(item)) }))
          .filter((item) => item.timestamp)
        : [];
      const scored = base
        .map((item) => {
          const text = `${item.title || ''} ${item.displayTitle || ''} ${item.summary || ''}`.toLowerCase();
          return {
            item,
            attentionScore: attentionScore(item),
            signalScore: signalScore(item),
            deltaSignal: deltaSignal(item),
            recencyScore: recencyScore(item, text),
            sourcePriority: sourcePriority(item),
            headlineClass: headlineClass(item),
            boost: candidateBoost(item),
          };
        })
        .filter((entry) => (entry.signalScore >= 60 || entry.attentionScore >= 60) && THEME_CAPS.has(themeBucket(entry.item)))
        .sort((a, b) =>
          b.deltaSignal - a.deltaSignal
          || b.attentionScore - a.attentionScore
          || b.signalScore - a.signalScore
          || b.sourcePriority - a.sourcePriority
          || b.recencyScore - a.recencyScore
          || b.item.timestamp - a.item.timestamp
        );

      const thresholds = [220, 180, 140, 120, 100, 80, 60];

      for (const threshold of thresholds) {
        const selected = selectSignalItems(scored, threshold);
        const decisionCount = selected.filter(isDecisionItem).length;
        const earlyCount = selected.filter(isEarlyOpportunity).length;
        if (selected.length >= 4 && decisionCount >= 2 && earlyCount >= 1) {
          const finalItems = selected.slice(0, 6).map((item) => ({
            ...item,
            title: item.displayTitle || item.title || '',
            ts: displayTimestamp(item),
          }));
          console.log('[builders] filtered_count', scored.length);
          console.log('[builders] first_screen_count', finalItems.length);
          console.log('[builders] first_screen_titles', finalItems.map((item) => item.title));
          return finalItems;
        }
      }

      const fallbackItems = selectSignalItems(scored, 60).slice(0, 6).map((item) => ({
        ...item,
        title: item.displayTitle || item.title || '',
        ts: displayTimestamp(item),
      }));
      console.log('[builders] filtered_count', scored.length);
      console.log('[builders] first_screen_count', fallbackItems.length);
      console.log('[builders] first_screen_titles', fallbackItems.map((item) => item.title));
      return fallbackItems;
    }

    async function loadFeed() {
      try {
        const nonce = Date.now();
        const feedRequestUrl = `${FEED_URL}?t=${nonce}`;
        const observeRequestUrl = `${BUILDERS_OBSERVE_URL}?t=${nonce}`;
        const earlyRequestUrl = `${EARLY_SIGNAL_URL}?t=${nonce}`;
        console.log('[builders] feed_url', feedRequestUrl);
        const [feedRes, observeRes, earlyRes] = await Promise.all([
          fetch(feedRequestUrl, { cache: 'no-store' }),
          fetch(observeRequestUrl, { cache: 'no-store' }),
          fetch(earlyRequestUrl, { cache: 'no-store' }),
        ]);
        if (!feedRes.ok) throw new Error(`HTTP ${feedRes.status}`);
        const payload = await feedRes.json();
        const data = Array.isArray(payload) ? payload : (payload.items || []);
        currentFeedItems = data;
        currentEarlySignals = Array.isArray(payload) ? [] : (payload.early_signals || []);
        console.log('[builders] data_count', data.length);
        console.log('[builders] item_titles', data.map((item) => item.title));

        let observeSnapshots = [];
        if (observeRes.ok) {
          try {
            observeSnapshots = await observeRes.json();
          } catch {
            observeSnapshots = [];
          }
        }

        let earlyHeaderTime = parseHeaderTime(earlyRes.headers.get('last-modified'));
        if (!earlyRes.ok) {
          earlyHeaderTime = null;
        } else {
          try {
            await earlyRes.clone().json();
          } catch {
            // ignore body parse for status-only file
          }
        }

        const firstScreenItems = buildSignalPool(data);
        renderPageStatus({
          feedFetchTime: Array.isArray(payload) ? null : payload.fetch_time,
          observeSnapshots,
          earlyHeaderTime,
          currentFirstScreenTitles: firstScreenItems.map((item) => item.title || ''),
        });
        render(firstScreenItems);
      } catch {
        feedEl.innerHTML = '<div class="empty">真实 feed 暂不可用</div>';
      }
    }

    if (!isMobile) {
      viewportEl.addEventListener('wheel', (e) => {
        e.preventDefault();
        targetY = clampScroll(targetY - e.deltaY);
      }, { passive: false });

      viewportEl.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      viewportEl.addEventListener('touchmove', (e) => {
        if (touchStartY == null) return;
        const y = e.touches[0].clientY;
        const delta = y - touchStartY;
        touchStartY = y;
        targetY = clampScroll(targetY + delta);
      }, { passive: true });

      viewportEl.addEventListener('touchend', () => {
        touchStartY = null;
      }, { passive: true });

      window.addEventListener('resize', () => {
        targetY = clampScroll(targetY);
        currentY = clampScroll(currentY);
        updateVisuals();
      });

      requestAnimationFrame(animate);
    }

    loadFeed();
    setInterval(loadFeed, 30000);
  </script>
