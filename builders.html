<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Builders Intel Screen</title>
  <meta name="description" content="推荐关注人情报屏。" />
  <style>
    :root{
      --bg:#020202;--line:rgba(255,255,255,.012);--text:#f7f7f2;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",Arial,sans-serif}
    html,body{height:100%;overflow:hidden}
    .viewport{position:fixed;inset:0;overflow:hidden;background:var(--bg)}
    .scroll-layer{will-change:transform}
    html.mobile, html.mobile body{height:auto;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch}
    html.mobile body{min-height:100vh}
    .mobile .viewport{position:relative;inset:auto;overflow:visible;min-height:100vh}
    .mobile .scroll-layer{will-change:auto;transform:none !important}
    .app{width:min(100vw,2620px);margin:0 auto;padding:34px 104px 42px}
    .feed{padding-top:0}
    .item{padding:16px 0 18px;border-bottom:1px solid transparent;transform-origin:center center;opacity:1;transform:translate3d(0,0,0) scale(1)}
    .item + .item{margin-top:2px}
    .item:first-child{padding-top:22px;padding-bottom:42px;margin-bottom:16px;border-bottom-color:rgba(255,255,255,.018)}
    .item:nth-child(n+2):nth-child(-n+6){padding-top:12px;padding-bottom:14px}
    .item:nth-child(n+7){padding-top:11px;padding-bottom:13px}
    .item.entering{opacity:0;transform:translate3d(0,18px,0) scale(.995)}
    .headline{width:100%;max-width:25ch;font-size:clamp(28px,3.22vw,58px);line-height:1.18;font-weight:510;letter-spacing:-.017em;color:rgba(247,247,242,.79);word-break:normal;overflow-wrap:break-word;line-break:loose;text-wrap:pretty;hyphens:none;transition:opacity .18s linear, transform .18s linear}
    .item:first-child .headline{max-width:22.2ch;font-size:clamp(39px,4.16vw,72px);line-height:1.12;font-weight:600;letter-spacing:-.022em;color:rgba(247,247,242,.958);text-wrap:balance}
    .item:nth-child(n+2):nth-child(-n+6) .headline{max-width:24.8ch;font-size:clamp(29px,3.16vw,52px);line-height:1.18;font-weight:520;color:rgba(247,247,242,.84);letter-spacing:-.017em;text-wrap:pretty}
    .item:nth-child(n+7) .headline{max-width:25.1ch;font-size:clamp(26px,3vw,48px);line-height:1.2;font-weight:505;color:rgba(247,247,242,.79);text-wrap:pretty}
    .item:nth-child(n+7) .meta{color:rgba(247,247,242,.38)}
    .meta{margin-top:8px;font-size:clamp(12px,1.02vw,14px);line-height:1.22;font-weight:475;letter-spacing:.012em;color:rgba(247,247,242,.48)}
    .item:first-child .meta{color:rgba(247,247,242,.5)}
    .item:nth-child(n+2):nth-child(-n+6) .meta{color:rgba(247,247,242,.46)}
    .empty{padding:48px 0;color:#777;font-size:24px}
    .mask{position:fixed;left:0;right:0;height:12vh;pointer-events:none;z-index:5}
    .mask-bottom{bottom:0;background:linear-gradient(0deg,rgba(2,2,2,.36) 0%,rgba(2,2,2,.18) 34%,rgba(2,2,2,.08) 64%,rgba(2,2,2,0) 100%)}
    @media (max-width: 1024px){
      .mobile .mask{display:none}
      .mobile .item,.mobile .headline{transition:none !important}
    }
    @media (pointer: coarse) and (min-width: 820px) and (orientation: landscape){
      .app{padding:20px 82px 32px}
      .item{padding:13px 0 15px}
      .item:first-child{padding-top:14px;padding-bottom:28px;margin-bottom:10px}
      .item:nth-child(n+2):nth-child(-n+6){padding-top:11px;padding-bottom:12px}
      .item:nth-child(n+7){padding-top:10px;padding-bottom:11px}
      .headline{max-width:25.2ch;font-size:clamp(25px,2.95vw,40px);line-height:1.2;font-weight:500;color:rgba(247,247,242,.81)}
      .item:first-child .headline{max-width:24.1ch;font-size:clamp(34px,3.96vw,50px);line-height:1.12;font-weight:584;color:rgba(247,247,242,.95)}
      .item:nth-child(n+2):nth-child(-n+6) .headline{max-width:25.1ch;font-size:clamp(27px,3.04vw,37px);line-height:1.175;font-weight:515;color:rgba(247,247,242,.845)}
      .item:nth-child(n+7) .headline{max-width:25.3ch;font-size:clamp(24px,2.8vw,33px);line-height:1.19;font-weight:500;color:rgba(247,247,242,.8)}
      .meta{margin-top:7px;font-size:13px;line-height:1.22;font-weight:478;color:rgba(247,247,242,.5)}
      .item:first-child .meta{color:rgba(247,247,242,.52)}
      .item:nth-child(n+2):nth-child(-n+6) .meta{color:rgba(247,247,242,.47)}
      .item:nth-child(n+7) .meta{color:rgba(247,247,242,.41)}
    }
    @media (pointer: coarse) and (min-width: 820px) and (orientation: portrait){
      .app{padding:18px 44px 32px}
      .item{padding:12px 0 14px}
      .item:first-child{padding-top:10px;padding-bottom:24px;margin-bottom:10px}
      .item:nth-child(n+2):nth-child(-n+6){padding-top:11px;padding-bottom:12px}
      .item:nth-child(n+7){padding-top:10px;padding-bottom:11px}
      .headline{max-width:24.2ch;font-size:clamp(24px,3.34vw,39px);line-height:1.195;font-weight:500;color:rgba(247,247,242,.81)}
      .item:first-child .headline{max-width:22.4ch;font-size:clamp(32px,4.26vw,47px);line-height:1.125;font-weight:580;color:rgba(247,247,242,.945)}
      .item:nth-child(n+2):nth-child(-n+6) .headline{max-width:24.3ch;font-size:clamp(26px,3.38vw,36px);line-height:1.18;font-weight:515;color:rgba(247,247,242,.845)}
      .item:nth-child(n+7) .headline{max-width:24.3ch;font-size:clamp(23px,3.1vw,32px);line-height:1.195;font-weight:500;color:rgba(247,247,242,.8)}
      .meta{margin-top:7px;font-size:13px;line-height:1.22;font-weight:478;color:rgba(247,247,242,.5)}
      .item:first-child .meta{color:rgba(247,247,242,.52)}
      .item:nth-child(n+2):nth-child(-n+6) .meta{color:rgba(247,247,242,.47)}
      .item:nth-child(n+7) .meta{color:rgba(247,247,242,.41)}
    }
    @media (max-width: 900px){
      .app{padding:12px 26px 28px}
      .item{padding:14px 0 17px}
      .item:first-child{padding-top:8px;padding-bottom:24px;margin-bottom:10px}
      .item:nth-child(n+2):nth-child(-n+6){padding-top:11px;padding-bottom:12px}
      .item:nth-child(n+7){padding-top:9px;padding-bottom:11px}
      .headline{max-width:100%;font-size:clamp(23px,6.82vw,40px);line-height:1.19;font-weight:500}
      .item:first-child .headline{max-width:100%;font-size:clamp(31px,8.1vw,49px);line-height:1.1;font-weight:600}
      .item:nth-child(n+2):nth-child(-n+6) .headline{max-width:100%;font-size:clamp(25px,6.78vw,40px);line-height:1.17;font-weight:520;color:rgba(247,247,242,.84)}
      .item:nth-child(n+7) .headline{max-width:100%;font-size:clamp(22px,6.32vw,36px);line-height:1.19;font-weight:500;color:rgba(247,247,242,.79)}
      .meta{margin-top:6px;font-size:12px;color:rgba(247,247,242,.44)}
      .mask{height:8vh}
    }
    @media (prefers-reduced-motion: reduce){
      .item,.headline{transition:none}
    }
  </style>
</head>
<body>
  <div class="viewport" id="viewport">
    <div class="mask mask-bottom"></div>
    <div class="scroll-layer" id="scrollLayer">
      <div class="app">
        <main class="feed" id="feed"></main>
      </div>
    </div>
  </div>

  <script>
    const feedEl = document.getElementById('feed');
    const viewportEl = document.getElementById('viewport');
    const scrollLayerEl = document.getElementById('scrollLayer');
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const isMobile = window.matchMedia('(pointer: coarse), (max-width: 1024px)').matches;
    if (isMobile) document.documentElement.classList.add('mobile');
    let targetY = 0;
    let currentY = 0;
    let firstRender = true;
    let touchStartY = null;
    let previousFeedIds = [];
    let lastRenderSignature = '';

    const SIGNAL_TERMS = {
      aiRelease: ['release', '发布', '更新', 'launch', 'launched', 'introducing', 'beta', 'version', 'mini', 'nano', 'opus', 'sonnet', 'bug bounty', 'acquire', 'agent', 'coding agent', 'claude code', 'model spec', 'computer use'],
      appleChange: ['iphone', 'ipad', 'mac', 'macbook', 'airpods', 'watch', 'ios', '应用', '功能', 'feature', 'product', 'm5', 'new app', '数字驾照'],
      macro: ['war', 'iran', 'middle east', 'ceasefire', 'strike', 'marines', 'btc', 'bitcoin', 'etf', 'fund flow', 'market structure', 'regulation', 'regulator', 'judge', 'court', 'pentagon', 'supply chain risk'],
      infra: ['security', 'audit', 'risk', 'breach', 'supply chain', 'chip', 'helium', 'wallet', 'infrastructure'],
      redditInfo: ['发布', '更新', '将发布', '计划支持', '数字驾照', '停止运营', '被 ai 取代', 'ability', 'launch', 'feature', 'apps', 'driver', 'license'],
      weak: ['podcast', 'share of the week', 'discussion', 'thread', 'hands-on report', 'anyone else', 'on “read”', 'on "read"', 'rumor', 'rumors', '体验', '吐槽', '观点', 'i think', 'why', 'how', 'versus', 'vs.', 'megathread', 'marketing', 'sponsored', 'sponsor'],
      charts: ['电影：', '剧集：', '图书：'],
    };
    const STRONG_SIGNAL_TERMS = ['openclaw', 'apple', 'openai', 'anthropic', 'war', 'iran', 'btc', 'bitcoin', 'etf'];
    const OFFICIAL_SOURCES = new Set([
      'Apple Newsroom',
      'OpenAI News',
      'Anthropic Newsroom',
      'Claude Code Changelog',
      'Claude release notes',
      'Tesla IR',
      'OpenClaw GitHub',
      'OpenClaw Blog',
      'OneKey Blog',
      'PlayStation Blog',
      'Sony Interactive'
    ]);
    const STRONG_SOURCES = new Set(['NYT', 'Bloomberg', 'Reuters', 'GitHub Trending']);
    const CHART_SOURCES = new Set(['Douban Movie Chart', 'JustWatch Movies', 'JustWatch TV', 'IMDb Movies', 'IMDb TV']);
    const PRIMARY_AI_TOPICS = new Set(['OPENCLAW', 'OPENAI', 'ANTHROPIC', 'CLAUDE', 'CLAUDE_CODE']);
    const GAME_TOPICS = new Set(['GAME', 'NINTENDO', 'SWITCH', 'LEAGUE_OF_LEGENDS', 'PLAYSTATION', 'SONY']);
    const TOKEN_STOPWORDS = new Set(['openai', 'anthropic', 'claude', 'apple', 'openclaw', 'the', 'and', 'for', 'with', 'this', 'that', 'will', 'into']);

    function hasCjk(value = '') {
      return /[\u4e00-\u9fff]/.test(value);
    }

    function cjkRatio(value = '') {
      const visible = String(value).replace(/\s/g, '');
      if (!visible) return 0;
      const cjk = (visible.match(/[\u4e00-\u9fff]/g) || []).length;
      return cjk / visible.length;
    }

    function matchesTerm(text, term) {
      if (!term) return false;
      if (/[^\w-]/.test(term) || term.includes(' ')) {
        return text.includes(term);
      }
      const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return new RegExp(`(^|[^a-z0-9])${escaped}([^a-z0-9]|$)`, 'i').test(text);
    }

    function includesAny(text, words) {
      return words.some((word) => matchesTerm(text, word));
    }

    function canonicalText(value = '') {
      return String(value).toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]+/g, ' ').replace(/\s+/g, ' ').trim();
    }

    function titleTokens(value = '') {
      return canonicalText(value)
        .split(' ')
        .filter((token) => token.length >= 3 && !TOKEN_STOPWORDS.has(token));
    }

    function isPrimaryAiRelease(item, text) {
      return PRIMARY_AI_TOPICS.has(item.topic) && OFFICIAL_SOURCES.has(item.source) && (
        item.topic === 'OPENCLAW'
        || includesAny(text, SIGNAL_TERMS.aiRelease)
      );
    }

    function isAppleChange(item, text) {
      return item.topic === 'APPLE' && includesAny(text, SIGNAL_TERMS.appleChange);
    }

    function isMacroSignal(item, text) {
      return includesAny(text, SIGNAL_TERMS.macro);
    }

    function isHeadlineMacroSignal(item) {
      return includesAny(`${item.title || ''} ${item.displayTitle || ''}`.toLowerCase(), SIGNAL_TERMS.macro);
    }

    function isInfrastructureSignal(item, text) {
      return includesAny(text, SIGNAL_TERMS.infra);
    }

    function isSecondaryReddit(item, text) {
      return item.source === 'Reddit'
        && item.priority >= 74
        && item.hot
        && hasCjk(item.displayTitle || '')
        && includesAny(text, SIGNAL_TERMS.redditInfo)
        && !includesAny(text, SIGNAL_TERMS.weak);
    }

    function isSecondaryNyt(item, text) {
      return item.source === 'NYT'
        && !/^[A-Za-z][A-Za-z.& -]+\s\d{1,2}:\d{2}$/.test(item.title || '')
        && (item.priority >= 67 || isMacroSignal(item, text) || isInfrastructureSignal(item, text));
    }

    function isSecondaryChart(item) {
      return CHART_SOURCES.has(item.source)
        && Number(item.rank || 999) <= 3
        && hasCjk(item.displayTitle || '')
        && !includesAny(item.displayTitle || '', SIGNAL_TERMS.charts.map((term) => term.toLowerCase()));
    }

    function isLowValue(item, text) {
      if (!hasCjk(item.displayTitle || '') && item.topic !== 'OPENCLAW') return true;
      if (cjkRatio(item.displayTitle || '') < 0.26 && item.topic !== 'OPENCLAW') return true;
      if (includesAny(text, SIGNAL_TERMS.weak)) return true;
      if (GAME_TOPICS.has(item.topic) && !includesAny(text, ['faker', 'worlds', 'championship', '被 ai 取代'])) return true;
      if (item.source === 'Reddit' && !isSecondaryReddit(item, text)) return true;
      if (item.source === 'NYT' && !isSecondaryNyt(item, text) && !isMacroSignal(item, text)) return true;
      if (CHART_SOURCES.has(item.source) && !isSecondaryChart(item)) return true;
      return false;
    }

    function ageHours(item) {
      if (!item.timestamp) return Number.POSITIVE_INFINITY;
      return (Math.floor(Date.now() / 1000) - item.timestamp) / 3600;
    }

    function isWhitelistTopic(item, text) {
      return ['OPENCLAW', 'OPENAI', 'ANTHROPIC', 'CLAUDE', 'CLAUDE_CODE', 'APPLE'].includes(item.topic)
        || includesAny(text, ['war', 'iran', 'btc', 'bitcoin', 'etf', 'regulation', 'regulator', 'judge', 'court']);
    }

    function passesSignalGate(item, text) {
      return isPrimaryAiRelease(item, text)
        || isAppleChange(item, text)
        || isHeadlineMacroSignal(item)
        || isInfrastructureSignal(item, text)
        || isSecondaryReddit(item, text)
        || isSecondaryNyt(item, text)
        || (STRONG_SOURCES.has(item.source) && includesAny(`${item.title || ''} ${item.displayTitle || ''}`.toLowerCase(), STRONG_SIGNAL_TERMS));
    }

    function recencyScore(item, text) {
      const hours = ageHours(item);
      if (hours <= 6) return 100;
      if (hours <= 24) return 88;
      if (hours <= 48) return 74;
      if (hours <= 72 && isWhitelistTopic(item, text)) return 36;
      if (hours <= 168 && isWhitelistTopic(item, text)) return 12;
      return 0;
    }

    function passesTimeGate(item, text) {
      const hours = ageHours(item);
      if (hours > 168) return false;
      if (hours <= 48) return true;
      if (hours > 72) return false;
      return isWhitelistTopic(item, text) && (isPrimaryAiRelease(item, text) || isHeadlineMacroSignal(item));
    }

    function attentionPenalty(item, text) {
      let penalty = 0;
      const title = String(item.displayTitle || item.title || '');
      const titleLength = title.replace(/\s+/g, '').length;
      const primary = isPrimaryAiRelease(item, text);
      const apple = isAppleChange(item, text);
      const macro = isHeadlineMacroSignal(item) || isMacroSignal(item, text);
      const hardInfo = primary || apple || macro;

      if (item.source === 'NYT' && item.topic === 'ANTHROPIC' && includesAny(text, ['judge', 'court', 'pentagon', 'supply chain risk'])) penalty += 150;
      if (item.topic === 'ONEKEY' || item.source === 'OneKey Blog') penalty += 140;
      if (isInfrastructureSignal(item, text) && !hardInfo) penalty += 90;
      if (titleLength >= 24 && !hardInfo) penalty += 24;
      if (!hardInfo && !isSecondaryReddit(item, text) && !isSecondaryNyt(item, text)) penalty += 36;
      return penalty;
    }

    function signalScore(item) {
      const text = `${item.title || ''} ${item.displayTitle || ''} ${item.summary || ''}`.toLowerCase();
      if (isLowValue(item, text)) return -999;
      if (!passesTimeGate(item, text)) return -999;
      if (!passesSignalGate(item, text)) return -999;

      let score = (item.priority || 0) * 0.28;
      if (includesAny(text, STRONG_SIGNAL_TERMS)) score += 54;

      if (isPrimaryAiRelease(item, text)) score += 148;
      if (isAppleChange(item, text)) score += 126;
      if (isHeadlineMacroSignal(item)) score += 122;
      else if (isMacroSignal(item, text)) score += 88;
      if (isInfrastructureSignal(item, text)) score += 26;
      if (isSecondaryReddit(item, text)) score += 34;
      if (isSecondaryNyt(item, text)) score += 14;
      if (isSecondaryChart(item)) score += 10;

      if (item.topic === 'APPLE' && OFFICIAL_SOURCES.has(item.source)) score += 16;
      if (OFFICIAL_SOURCES.has(item.source)) score += 18;
      if (STRONG_SOURCES.has(item.source)) score += 18;
      if (item.sourceLayer === 'A') score += 10;
      if (item.source === 'OpenClaw GitHub') score += 74;
      if (item.source === 'OpenClaw Blog') score += 18;
      if (item.source === 'Reddit') score -= 14;
      if (item.source === 'NYT') score -= 8;
      if (ageHours(item) > 24) score -= 18;
      if (ageHours(item) > 48) score -= 36;

      score -= attentionPenalty(item, text);
      return Math.round(score * 10) / 10;
    }

    function signalFamily(item) {
      const text = `${item.title || ''} ${item.displayTitle || ''} ${item.summary || ''}`.toLowerCase();
      if (item.topic === 'OPENCLAW' || (item.source || '').startsWith('OpenClaw')) return 'OPENCLAW_UPDATE';
      if (isMacroSignal(item, text) && item.topic === 'ANTHROPIC') return 'ANTHROPIC_REGULATION';
      if (isMacroSignal(item, text)) return 'MACRO_SIGNAL';
      if (isInfrastructureSignal(item, text) && item.topic === 'ONEKEY') return 'CRYPTO_INFRA';
      if (item.topic === 'APPLE') return 'APPLE_CHANGE';
      if (PRIMARY_AI_TOPICS.has(item.topic)) return `${item.topic}_SIGNAL`;
      if (item.topic === 'TESLA') return 'TESLA_SIGNAL';
      return item.topic || item.source || 'OTHER';
    }

    function themeBucket(item) {
      const family = signalFamily(item);
      if (family === 'OPENCLAW_UPDATE') return 'OPENCLAW';
      if (family === 'MACRO_SIGNAL') return 'MACRO';
      if (family === 'CRYPTO_INFRA') return 'CRYPTO';
      if (family === 'APPLE_CHANGE') return 'APPLE';
      if (family === 'ANTHROPIC_REGULATION' || family.endsWith('_SIGNAL')) return 'AI';
      if (family === 'TESLA_SIGNAL') return 'TESLA';
      return family;
    }

    function isNearDuplicate(item, selected) {
      const keyA = canonicalText(item.displayTitle || item.title || '');
      const tokensA = titleTokens(item.displayTitle || item.title || '');
      const strictFamilies = new Set(['OPENCLAW_UPDATE', 'APPLE_CHANGE', 'ANTHROPIC_REGULATION', 'CRYPTO_INFRA']);
      return selected.some((picked) => {
        const keyB = canonicalText(picked.displayTitle || picked.title || '');
        if (!keyA || !keyB) return false;
        if (keyA === keyB) return true;
        const familyA = signalFamily(item);
        const familyB = signalFamily(picked);
        if (familyA === familyB && strictFamilies.has(familyA)) return true;
        if (keyA.length >= 12 && keyB.length >= 12 && (keyA.includes(keyB) || keyB.includes(keyA))) return true;
        const tokensB = titleTokens(picked.displayTitle || picked.title || '');
        const shared = tokensA.filter((token) => tokensB.includes(token));
        return shared.length >= 3;
      });
    }

    function clampScroll(value) {
      const minY = Math.min(0, viewportEl.clientHeight - scrollLayerEl.scrollHeight);
      return Math.max(minY, Math.min(0, value));
    }

    function validTimestamp(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric) || numeric <= 0) return null;
      const now = Math.floor(Date.now() / 1000);
      if (numeric > now + 300) return null;
      if (numeric < now - 30 * 24 * 60 * 60) return null;
      return numeric;
    }

    function buildSignature(items) {
      return Array.isArray(items) ? items.map(item => `${item.id}::${item.title || ''}::${item.timestamp || ''}`).join('\n') : '';
    }

    function formatRelativeTime(ts) {
      const safeTs = validTimestamp(ts);
      if (!safeTs) return '';
      const date = new Date(safeTs * 1000);
      if (Number.isNaN(date.getTime())) return '';
      const diff = Date.now() - date.getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return '刚刚';
      if (mins < 60) return `${mins} 分钟前`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours} 小时前`;
      const days = Math.floor(hours / 24);
      return days <= 30 ? `${days} 天前` : '';
    }

    function updateVisuals() {
      if (isMobile) return;
      const center = window.innerHeight / 2;
      feedEl.querySelectorAll('.item').forEach((item) => {
        const rect = item.getBoundingClientRect();
        const itemCenter = rect.top + rect.height / 2;
        const distance = Math.min(1, Math.abs(itemCenter - center) / (window.innerHeight * 0.65));
        const opacity = reduceMotion ? 1 : 1 - distance * 0.28;
        const scale = reduceMotion ? 1 : 1 - distance * 0.018;
        item.style.opacity = opacity.toFixed(3);
        item.style.transform = `translate3d(0,0,0) scale(${scale.toFixed(4)})`;
      });
    }

    function animate() {
      if (isMobile) return;
      currentY = reduceMotion ? targetY : currentY + (targetY - currentY) * 0.12;
      if (Math.abs(targetY - currentY) < 0.1) currentY = targetY;
      scrollLayerEl.style.transform = `translate3d(0, ${currentY}px, 0)`;
      updateVisuals();
      requestAnimationFrame(animate);
    }

    function createItem(item, entering) {
      const article = document.createElement('article');
      article.className = 'item';
      article.dataset.id = item.id;
      const headline = document.createElement('div');
      headline.className = 'headline';
      headline.textContent = item.displayTitle || item.title || '';
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = formatRelativeTime(item.timestamp);
      article.appendChild(headline);
      article.appendChild(meta);
      if (entering && !reduceMotion) {
        article.classList.add('entering');
        requestAnimationFrame(() => article.classList.remove('entering'));
      }
      return article;
    }

    function render(items) {
      if (!Array.isArray(items) || !items.length) {
        feedEl.innerHTML = '<div class="empty">暂无情报</div>';
        return;
      }
      const signature = buildSignature(items);
      if (signature === lastRenderSignature) return;
      lastRenderSignature = signature;
      const existing = new Map([...feedEl.querySelectorAll('.item')].map(node => [node.dataset.id, node]));
      const nextIds = items.map(item => String(item.id));
      const fragment = document.createDocumentFragment();
      for (const item of items) {
        const id = String(item.id);
        let node = existing.get(id);
        if (!node) {
          const entering = !firstRender && !previousFeedIds.includes(id);
          node = createItem(item, entering);
        } else {
          const textEl = node.querySelector('.headline');
          const nextTitle = item.displayTitle || item.title || '';
          if (textEl && textEl.textContent !== nextTitle) textEl.textContent = nextTitle;
          const metaEl = node.querySelector('.meta');
          if (metaEl) metaEl.textContent = formatRelativeTime(item.timestamp);
        }
        fragment.appendChild(node);
      }
      feedEl.replaceChildren(fragment);
      previousFeedIds = nextIds;
      if (firstRender) {
        targetY = currentY = 0;
        if (!isMobile) scrollLayerEl.style.transform = 'translate3d(0,0,0)';
        firstRender = false;
      } else if (!isMobile) {
        targetY = clampScroll(targetY);
      }
      updateVisuals();
    }

    function selectSignalItems(scored, threshold) {
      const selected = [];
      const sourceCap = new Map();
      const themeCap = new Map();

      const candidates = scored.filter((entry) => entry.signalScore >= threshold);

      function tryPick(entry, diversifyFirstFive) {
        const item = {
          ...entry.item,
          signal_score: entry.signalScore,
        };
        const theme = themeBucket(item);
        const nextSourceCount = sourceCap.get(item.source) || 0;

        if (nextSourceCount >= 2) return;
        if (diversifyFirstFive && selected.length < 5 && (themeCap.get(theme) || 0) >= 1) return;
        if (isNearDuplicate(item, selected)) return;

        sourceCap.set(item.source, nextSourceCount + 1);
        if (selected.length < 5) {
          themeCap.set(theme, (themeCap.get(theme) || 0) + 1);
        }
        selected.push(item);
      }

      for (const entry of candidates) {
        tryPick(entry, true);
        if (selected.length >= 4) break;
      }

      for (const entry of candidates) {
        if (selected.length >= 4) break;
        tryPick(entry, false);
      }

      return selected;
    }

    function buildSignalPool(items) {
      const base = Array.isArray(items)
        ? items
          .filter(Boolean)
          .map((item) => ({ ...item, timestamp: validTimestamp(item.timestamp) }))
          .filter((item) => item.timestamp)
        : [];
      const scored = base
        .map((item) => {
          const text = `${item.title || ''} ${item.displayTitle || ''} ${item.summary || ''}`.toLowerCase();
          return {
            item,
            signalScore: signalScore(item),
            recencyScore: recencyScore(item, text),
          };
        })
        .filter((entry) => entry.signalScore >= 60)
        .sort((a, b) => b.signalScore - a.signalScore || b.recencyScore - a.recencyScore || b.item.timestamp - a.item.timestamp);

      const thresholds = [240, 200, 160, 120];

      for (const threshold of thresholds) {
        const selected = selectSignalItems(scored, threshold);
        if (selected.length >= 4) return selected.slice(0, 4);
      }

      return selectSignalItems(scored, 120).slice(0, 4);
    }

    async function loadFeed() {
      try {
        const res = await fetch(`./data/feed.json?t=${Date.now()}`, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        render(buildSignalPool(data));
      } catch {
        feedEl.innerHTML = '<div class="empty">真实 feed 暂不可用</div>';
      }
    }

    if (!isMobile) {
      viewportEl.addEventListener('wheel', (e) => {
        e.preventDefault();
        targetY = clampScroll(targetY - e.deltaY);
      }, { passive: false });

      viewportEl.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      viewportEl.addEventListener('touchmove', (e) => {
        if (touchStartY == null) return;
        const y = e.touches[0].clientY;
        const delta = y - touchStartY;
        touchStartY = y;
        targetY = clampScroll(targetY + delta);
      }, { passive: true });

      viewportEl.addEventListener('touchend', () => {
        touchStartY = null;
      }, { passive: true });

      window.addEventListener('resize', () => {
        targetY = clampScroll(targetY);
        currentY = clampScroll(currentY);
        updateVisuals();
      });

      requestAnimationFrame(animate);
    }

    loadFeed();
    setInterval(loadFeed, 30000);
  </script>
</body>
</html>
