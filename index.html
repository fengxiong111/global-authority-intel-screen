    <title>Authority Intel Screen</title>
    <meta name="description" content="高信号公开源情报屏。" />
    <link rel="stylesheet" href="./styles.css?v=20260329b" />

  <body>
    <main class="shell">
      <div id="page-updated" class="page-updated">本页更新于 载入中…</div>
      <header id="topbar" class="topbar" hidden>
        <p class="eyebrow">AUTHORITY INTEL SCREEN</p>
        <h1>高信号公开源情报屏</h1>
        <p class="subhead">单列、黑底、左对齐。只保留时间、来源、分类、标题与链接。</p>
        <div class="meta-row">
          <span id="last-updated">更新于 载入中…</span>
          <span id="feed-status" hidden></span>
        </div>
      </header>

      <section id="controls" class="controls" hidden>
        <div class="filter-group" id="category-filter"></div>
        <div class="toolbar">
          <label>
            <span>来源</span>
            <select id="source-filter">
              <option value="ALL">全部来源</option>
            </select>
          </label>
          <label class="toggle">
            <input id="hot-only" type="checkbox" />
            <span>只看高优先级</span>
          </label>
        </div>
      </section>

      <section id="feed" class="feed" aria-live="polite"></section>
      <section id="empty-state" class="empty-state" hidden>
        <p>当前筛选条件下没有可显示的条目。</p>
      </section>
    </main>
